<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1420" viewBox="0 0 1800 1420">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#27364a"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 36px Arial, sans-serif; fill: #122033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5d73; }
      .section { font: 700 20px Arial, sans-serif; fill: #122033; }
      .label { font: 700 17px Arial, sans-serif; fill: #122033; }
      .small { font: 400 14px Arial, sans-serif; fill: #44546a; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #516174; }
      .mono { font: 400 13px Consolas, Menlo, monospace; fill: #26364a; }
      .box { fill: #ffffff; stroke: #27364a; stroke-width: 2; rx: 12; }
      .main { fill: #eaf2ff; stroke: #225e9f; stroke-width: 2.5; rx: 14; }
      .cnn { fill: #edf8f2; stroke: #22744a; stroke-width: 2; rx: 12; }
      .attn { fill: #fff5df; stroke: #a05f00; stroke-width: 2; rx: 12; }
      .head { fill: #f3ecff; stroke: #6843a3; stroke-width: 2; rx: 12; }
      .note { fill: #ffffff; stroke: #c9d3df; stroke-width: 1.5; rx: 10; }
      .line { stroke: #27364a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #6d7d90; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8a98aa; stroke-width: 1.5; stroke-dasharray: 6 6; fill: none; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1420"/>

  <text class="title" x="70" y="70">Current v3 GBMJ Policy Network</text>
  <text class="subtitle" x="70" y="103">Direct 235-way supervised policy: MultiScaleStem + Res2Net-style CNN blocks + 4x9-token Transformer</text>

  <rect class="note" x="1280" y="48" width="440" height="118"/>
  <text class="section" x="1305" y="82">Current v3 config</text>
  <text class="mono" x="1305" y="110">obs = [B, 194, 4, 9]</text>
  <text class="mono" x="1305" y="132">channels=256, blocks=10, scale=4</text>
  <text class="mono" x="1305" y="154">Transformer: dim=512, heads=8, layers=3</text>

  <!-- Main pipeline -->
  <rect class="main" x="100" y="190" width="390" height="110"/>
  <text class="label" x="130" y="230">Input observation</text>
  <text class="mono" x="130" y="258">[B, 194, 4, 9]</text>
  <text class="small" x="130" y="282">194 visible feature planes on a 4x9 tile grid</text>

  <path class="line" d="M490 245 H590"/>

  <rect class="cnn" x="590" y="185" width="430" height="120"/>
  <text class="label" x="620" y="225">MultiScaleStem</text>
  <text class="mono" x="620" y="253">4 parallel ConvBNAct branches</text>
  <text class="small" x="620" y="278">Concat -> 1x1 ConvBNAct project</text>
  <text class="mono" x="875" y="253">[B, 256, 4, 9]</text>

  <path class="line" d="M1020 245 H1120"/>

  <rect class="cnn" x="1120" y="185" width="500" height="120"/>
  <text class="label" x="1150" y="225">SpatialRes2Block x 10</text>
  <text class="mono" x="1150" y="253">channels=256, base_width=26, scale=4</text>
  <text class="small" x="1150" y="278">Res2Net-style hierarchical residual CNN + SE</text>

  <path class="line" d="M1370 305 V388"/>

  <rect class="attn" x="1120" y="388" width="500" height="128"/>
  <text class="label" x="1150" y="428">Tokenize 4x9 spatial grid</text>
  <text class="mono" x="1150" y="456">Flatten grid: 36 tokens, each 256-dim</text>
  <text class="mono" x="1150" y="480">Linear token projection: 256 -> 512</text>
  <text class="small" x="1150" y="504">Prepend CLS token and add learned position embedding</text>

  <path class="line" d="M1120 452 H1018"/>

  <rect class="attn" x="590" y="388" width="428" height="128"/>
  <text class="label" x="620" y="428">Transformer Encoder x 3</text>
  <text class="mono" x="620" y="456">tokens = [B, 37, 512]</text>
  <text class="mono" x="620" y="480">heads=8, FFN=2048, GELU, dropout=0.15</text>
  <text class="small" x="620" y="504">norm_first=True, batch_first=True</text>

  <path class="line" d="M590 452 H490"/>

  <rect class="attn" x="100" y="388" width="390" height="128"/>
  <text class="label" x="130" y="428">Feature fusion</text>
  <text class="mono" x="130" y="456">CLS feature: [B, 512]</text>
  <text class="mono" x="130" y="480">Mean of 36 grid tokens: [B, 512]</text>
  <text class="mono" x="130" y="504">Concat -> [B, 1024]</text>

  <path class="line" d="M295 516 V608"/>

  <rect class="head" x="100" y="608" width="390" height="138"/>
  <text class="label" x="130" y="648">Policy head</text>
  <text class="mono" x="130" y="676">Dropout(0.15)</text>
  <text class="mono" x="130" y="700">Linear 1024 -> 512 -> SiLU</text>
  <text class="mono" x="130" y="724">Dropout(0.15) -> Linear 512 -> 235</text>

  <path class="line" d="M490 677 H590"/>

  <rect class="head" x="590" y="608" width="430" height="138"/>
  <text class="label" x="620" y="648">Action logits</text>
  <text class="mono" x="620" y="676">[B, 235]</text>
  <text class="small" x="620" y="704">Direct action-space policy output</text>
  <text class="tiny" x="620" y="728">pass / win / discard / kong / closed-kong / add-kong / pung / chow</text>

  <!-- Detail: MultiScaleStem -->
  <rect class="note" x="100" y="825" width="720" height="470"/>
  <text class="section" x="130" y="862">Detail A: MultiScaleStem, parallel local pattern encoder</text>
  <text class="small" x="130" y="890">All branches see the same input independently. This is parallel multi-kernel fusion, not Res2Net hierarchy.</text>

  <rect class="box" x="145" y="930" width="145" height="70"/>
  <text class="label" x="170" y="958">Branch 1</text>
  <text class="mono" x="165" y="982">1x3 Conv</text>

  <rect class="box" x="315" y="930" width="145" height="70"/>
  <text class="label" x="340" y="958">Branch 2</text>
  <text class="mono" x="335" y="982">1x5 Conv</text>

  <rect class="box" x="485" y="930" width="145" height="70"/>
  <text class="label" x="510" y="958">Branch 3</text>
  <text class="mono" x="505" y="982">3x1 Conv</text>

  <rect class="box" x="655" y="930" width="145" height="70"/>
  <text class="label" x="680" y="958">Branch 4</text>
  <text class="mono" x="675" y="982">3x3 Conv</text>

  <path class="thin" d="M217 1000 V1052"/>
  <path class="thin" d="M387 1000 V1052"/>
  <path class="thin" d="M557 1000 V1052"/>
  <path class="thin" d="M727 1000 V1052"/>

  <rect class="cnn" x="250" y="1052" width="420" height="78"/>
  <text class="label" x="355" y="1084">Concat channels</text>
  <text class="mono" x="350" y="1110">4 x 64 -> 256</text>

  <path class="thin" d="M460 1130 V1178"/>

  <rect class="cnn" x="250" y="1178" width="420" height="78"/>
  <text class="label" x="337" y="1210">1x1 ConvBNAct project</text>
  <text class="mono" x="362" y="1236">[B, 256, 4, 9]</text>

  <!-- Detail: Res2Block -->
  <rect class="note" x="900" y="825" width="800" height="470"/>
  <text class="section" x="930" y="862">Detail B: One SpatialRes2Block, repeated 10 times</text>
  <text class="small" x="930" y="890">This is the Res2Net-style hierarchical path. Later groups depend on earlier group outputs.</text>

  <rect class="box" x="940" y="930" width="165" height="76"/>
  <text class="label" x="970" y="960">Input</text>
  <text class="mono" x="965" y="984">[B,256,4,9]</text>

  <path class="thin" d="M1105 968 H1170"/>

  <rect class="cnn" x="1170" y="930" width="220" height="76"/>
  <text class="label" x="1210" y="960">1x1 Conv</text>
  <text class="mono" x="1200" y="984">256 -> 416</text>

  <path class="thin" d="M1390 968 H1455"/>

  <rect class="cnn" x="1455" y="930" width="200" height="76"/>
  <text class="label" x="1496" y="960">Split x4</text>
  <text class="mono" x="1487" y="984">4 groups x 104</text>

  <rect class="box" x="955" y="1065" width="155" height="82"/>
  <text class="label" x="990" y="1096">g1</text>
  <text class="mono" x="975" y="1120">3x3 Conv</text>

  <rect class="box" x="1145" y="1065" width="155" height="82"/>
  <text class="label" x="1170" y="1096">g2 + y1</text>
  <text class="mono" x="1165" y="1120">3x3 Conv</text>

  <rect class="box" x="1335" y="1065" width="155" height="82"/>
  <text class="label" x="1360" y="1096">g3 + y2</text>
  <text class="mono" x="1355" y="1120">3x3 Conv</text>

  <rect class="box" x="1525" y="1065" width="155" height="82"/>
  <text class="label" x="1560" y="1096">g4</text>
  <text class="mono" x="1550" y="1120">passthrough</text>

  <path class="thin" d="M1032 1147 V1190"/>
  <path class="thin" d="M1222 1147 V1190"/>
  <path class="thin" d="M1412 1147 V1190"/>
  <path class="thin" d="M1602 1147 V1190"/>

  <rect class="cnn" x="1075" y="1190" width="430" height="72"/>
  <text class="label" x="1198" y="1219">Concat -> 1x1 Conv</text>
  <text class="mono" x="1190" y="1244">416 -> 256, BN, SE, Dropout2d</text>

  <path class="dash" d="M1023 1006 C935 1110, 940 1205, 1075 1225"/>
  <text class="tiny" x="940" y="1268">Residual skip: input + block output -> SiLU</text>

  <!-- Footer notes -->
  <rect class="note" x="100" y="1330" width="1600" height="54"/>
  <text class="small" x="130" y="1362">Source: current v3 code/config. Architecture contract: visible encoder obs_shape=(194,4,9), ACTION_SPACE=235, supervised CE policy model.</text>
</svg>
