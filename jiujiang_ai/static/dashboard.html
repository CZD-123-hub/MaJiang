<main class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">九江红中麻将 · 实时观察</p>
      <h1>机器人对局看板</h1>
      <div class="suit-legend" aria-label="花色图例"><span class="legend-wan">万</span><span class="legend-tiao">条</span><span class="legend-tong">筒</span><span class="legend-hong">红中</span></div>
    </div>
    <div class="connection"><span id="connection-dot"></span><span id="connection-text">正在连接日志…</span></div>
  </header>

  <section class="summary" aria-label="当前对局概要">
    <div><span>房间</span><strong id="room-id">—</strong></div>
    <div><span>当前决策</span><strong id="current-player">—</strong></div>
    <div><span>剩余牌</span><strong id="wall-count">—</strong></div>
    <div><span>最新动作</span><strong id="latest-action">—</strong></div>
  </section>

  <section class="table-layout" aria-label="麻将牌桌">
    <article class="player north" data-seat="2"><h2>座位 2</h2><div class="melds"></div><div class="hand"></div><div class="discards"></div></article>
    <article class="player west" data-seat="3"><h2>座位 3</h2><div class="melds"></div><div class="hand"></div><div class="discards"></div></article>
    <div id="table-center" class="table-center">
      <span class="turn-beacon turn-north" aria-hidden="true">▲</span><span class="turn-beacon turn-west" aria-hidden="true">◀</span><span class="turn-beacon turn-east" aria-hidden="true">▶</span><span class="turn-beacon turn-south" aria-hidden="true">▼</span>
      <span id="turn-status" class="turn-status">当前轮次</span><span>牌池</span><strong id="center-wall">—</strong><small id="turn-hint">等待测试服动作</small>
    </div>
    <article class="player east" data-seat="1"><h2>座位 1</h2><div class="melds"></div><div class="hand"></div><div class="discards"></div></article>
    <article class="player south" data-seat="0"><h2>座位 0</h2><div class="melds"></div><div class="hand"></div><div class="discards"></div></article>
  </section>

  <section class="panel recent-results"><div class="panel-title"><h2>最近 16 局结算 <span id="recent-round-summary" class="round-summary">我的胜场 0 / 0</span></h2><span>测试服回调 · 已按房间去重</span></div><div id="round-results" class="round-results"></div></section>

  <section class="lower-layout">
    <article class="panel"><div class="panel-title"><h2>动作时间线</h2><span id="event-count">0 条</span></div><ol id="timeline" class="timeline"></ol></article>
    <article class="panel"><div class="panel-title"><h2>本次动作统计</h2><span>最近日志</span></div><div id="action-counts" class="action-counts"></div></article>
  </section>
</main>

<style>
  :root { color-scheme:light; --ink:#18324f; --blue:#1677d2; --blue-deep:#0e5fae; --blue-soft:#eaf4ff; --blue-pale:#f6faff; --line:#cfe0f2; --muted:#647b94; --white:#ffffff; --warm:#e49a28; --red:#c83d4b; }
  * { box-sizing:border-box; } body { margin:0; min-width:320px; color:var(--ink); font-family:"Microsoft YaHei",system-ui,sans-serif; background:linear-gradient(180deg,#e8f4ff 0,#f7fbff 300px,#f2f7fc 100%); }
  .app-shell { max-width:1760px; margin:0 auto; padding:30px 26px 40px; } .topbar,.summary,.panel-title,.connection { display:flex; align-items:center; justify-content:space-between; gap:16px; } .topbar { padding:0 4px 20px; border-bottom:1px solid rgba(22,119,210,.16); } .eyebrow { color:var(--blue); margin:0 0 5px; font-size:13px; font-weight:600; letter-spacing:.08em; } h1 { margin:0; color:#103c6d; font-size:29px; letter-spacing:.02em; } h2 { margin:0; color:#194b7c; font-size:14px; font-weight:600; } .suit-legend { display:flex; gap:7px; margin-top:10px; font-size:12px; font-weight:600; } .suit-legend span { padding:3px 8px; border-radius:999px; } .legend-wan { color:#a75c05; background:#fff5df; } .legend-tiao { color:#14724b; background:#e8f8ef; } .legend-tong { color:#1667ae; background:#e9f4ff; } .legend-hong { color:#b83245; background:#fff0f2; } .connection { color:var(--muted); font-size:13px; background:var(--white); padding:9px 12px; border:1px solid var(--line); border-radius:999px; box-shadow:0 4px 14px rgba(29,98,161,.08); } #connection-dot { width:9px; height:9px; border-radius:50%; background:var(--warm); box-shadow:0 0 0 4px rgba(228,154,40,.14); } #connection-dot.ready { background:var(--blue); box-shadow:0 0 0 4px rgba(22,119,210,.14); }
  .summary { margin:22px 0; display:grid; grid-template-columns:repeat(4,1fr); background:var(--white); border:1px solid var(--line); border-radius:14px; padding:17px 20px; box-shadow:0 10px 26px rgba(35,106,166,.08); } .summary div { display:grid; gap:6px; padding-left:15px; border-left:3px solid #d8eaff; } .summary div:first-child { padding-left:0; border-left:0; } .summary span,.panel-title span { color:var(--muted); font-size:12px; } .summary strong { color:#104a83; font-size:20px; }
  .table-layout { display:grid; grid-template-columns:minmax(420px,1fr) minmax(250px,310px) minmax(420px,1fr); grid-template-rows:minmax(154px,auto) minmax(270px,1fr) minmax(154px,auto); gap:14px; align-items:stretch; } .player,.table-center,.panel { background:var(--white); border:1px solid var(--line); border-radius:14px; box-shadow:0 8px 20px rgba(36,103,164,.06); } .player { align-self:start; padding:15px 17px; min-width:0; transition:box-shadow .2s,transform .2s; } .player h2 { display:flex; align-items:center; gap:7px; } .player h2::before { content:""; width:7px; height:7px; border-radius:50%; background:#9bc9f2; } .player.active { border-color:#69abe4; box-shadow:0 0 0 3px rgba(22,119,210,.14),0 10px 24px rgba(36,103,164,.11); transform:translateY(-1px); } .player.active h2::before { background:var(--blue); box-shadow:0 0 0 4px rgba(22,119,210,.12); } .north { grid-column:1 / 4; grid-row:1; width:min(760px,100%); justify-self:center; } .west { grid-column:1; grid-row:2; } .east { grid-column:3; grid-row:2; } .south { grid-column:1 / 4; grid-row:3; width:min(760px,100%); justify-self:center; } .table-center { grid-column:2; grid-row:2; min-height:250px; position:relative; display:grid; place-content:center; text-align:center; gap:6px; overflow:hidden; background:radial-gradient(circle at 50% 35%,#f8fcff 0,#ddebfa 100%); border-color:#a9cceb; } .table-center::before,.table-center::after { content:""; position:absolute; width:160px; height:160px; border:1px solid rgba(22,119,210,.13); border-radius:50%; } .table-center::before { top:-70px; left:-70px; } .table-center::after { right:-76px; bottom:-76px; } .table-center span,.table-center small,.table-center strong { position:relative; z-index:1; } .table-center span { color:var(--muted); font-size:13px; letter-spacing:.12em; } .table-center strong { color:var(--blue-deep); font-size:38px; line-height:1; } .table-center small { color:#35658f; max-width:170px; line-height:1.4; } .turn-status { min-height:20px; color:#1470c1 !important; font-size:14px !important; font-weight:700; letter-spacing:.05em !important; } .turn-beacon { position:absolute !important; z-index:3 !important; opacity:.14; color:#2b8ad8 !important; font-size:32px !important; line-height:1 !important; transition:opacity .25s,filter .25s; } .turn-north { top:12px; left:calc(50% - 14px); } .turn-south { bottom:12px; left:calc(50% - 14px); } .turn-west { left:13px; top:calc(50% - 16px); } .turn-east { right:13px; top:calc(50% - 16px); } .table-center[data-turn="2"] .turn-north,.table-center[data-turn="3"] .turn-west,.table-center[data-turn="1"] .turn-east,.table-center[data-turn="0"] .turn-south { opacity:1; color:#0871c8 !important; filter:drop-shadow(0 3px 4px rgba(22,119,210,.26)); animation:turn-signal 1.15s ease-in-out infinite; } @keyframes turn-signal { 0%,100% { transform:scale(1); } 50% { transform:scale(1.25); } } @media (prefers-reduced-motion:reduce) { .table-center[data-turn="2"] .turn-north,.table-center[data-turn="3"] .turn-west,.table-center[data-turn="1"] .turn-east,.table-center[data-turn="0"] .turn-south { animation:none; } }
  .melds { min-height:30px; margin:9px 0 7px; display:flex; flex-wrap:nowrap; gap:4px; overflow-x:auto; } .hand { min-height:72px; display:flex; flex-wrap:nowrap; gap:3px; align-content:flex-start; overflow-x:auto; padding:14px 2px 9px; } .discards { min-height:54px; margin-top:11px; padding-top:10px; border-top:1px dashed #c8dbea; display:flex; flex-wrap:wrap; gap:4px; align-content:flex-start; }
  .tile { width:32px; height:43px; display:grid; place-items:center; position:relative; background:linear-gradient(145deg,#ffffff,#e8f4ff); color:#1e4e7c; border:1px solid #a8c9e4; border-top:4px solid #7facd2; border-bottom:3px solid #7facd2; border-radius:5px; box-shadow:0 2px 3px rgba(23,86,141,.12); font-size:12px; font-weight:700; transition:transform .18s ease,box-shadow .18s ease,background .18s ease; } .tile.suit-wan { color:#ad6207; background:linear-gradient(145deg,#fff,#fff4d9); border-color:#e9c276; border-top-color:#d98a13; border-bottom-color:#c78a34; } .tile.suit-tiao { color:#187a53; background:linear-gradient(145deg,#fff,#e9f8f0); border-color:#a9d9bd; border-top-color:#2d9b6b; border-bottom-color:#65ae89; } .tile.suit-tong { color:#1767ad; background:linear-gradient(145deg,#fff,#e9f4ff); border-color:#a8c9e4; border-top-color:#287ec7; border-bottom-color:#6ea5d1; } .tile.suit-hong,.tile.red { color:var(--red); background:linear-gradient(145deg,#fff,#fff0f1); border-color:#efadb4; border-top-color:#d84f5a; border-bottom-color:#d6777d; } .tile.pending-discard { z-index:2; color:#083d75; background:linear-gradient(145deg,#ffffff,#cce8ff); border-color:#1878cf; border-top-color:#1878cf; border-bottom-color:#0e5fae; box-shadow:0 0 0 3px rgba(22,119,210,.19),0 9px 15px rgba(22,119,210,.25); transform:translateY(-10px); } .tile.pending-discard::after { content:"即将出"; position:absolute; left:50%; bottom:-19px; transform:translateX(-50%); padding:2px 5px; border-radius:4px; background:#1677d2; color:#fff; font-size:9px; line-height:1.1; white-space:nowrap; font-weight:500; } .tile.discard { width:25px; height:31px; font-size:10px; border-top-width:3px; background:#eef6fc; border-bottom-width:2px; box-shadow:none; } .tile.meld { width:27px; height:36px; background:linear-gradient(145deg,#fffdf3,#f7e4a8); border-color:#dfbd68; border-top-color:#dfbd68; border-bottom-color:#c4952f; } .empty { color:var(--muted); font-size:12px; }
  .lower-layout { display:grid; grid-template-columns:2fr 1fr; gap:14px; margin-top:14px; } .panel { padding:16px; min-height:170px; } .panel-title { padding-bottom:11px; border-bottom:1px solid #dfebf6; } .timeline { list-style:none; padding:0; margin:7px 0 0; max-height:286px; overflow:auto; } .timeline li { padding:10px 3px; border-bottom:1px solid #edf3f8; display:grid; grid-template-columns:90px 72px 1fr; gap:10px; font-size:13px; } .timeline time { color:var(--muted); } .action-label { color:var(--blue); font-weight:600; } .action-counts { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin-top:14px; } .count-item { background:var(--blue-pale); border:1px solid #dceaf7; padding:11px; border-radius:9px; display:grid; gap:4px; } .count-item span { color:var(--muted); font-size:12px; } .count-item strong { color:var(--blue-deep); font-size:22px; }
  .lower-layout { display:grid; grid-template-columns:2fr 1fr; gap:14px; margin-top:14px; } .panel { padding:16px; min-height:170px; } .panel-title { padding-bottom:11px; border-bottom:1px solid #dfebf6; } .panel-title .round-summary { display:inline-block; margin-left:8px; color:#1677d2; font-size:12px; font-weight:600; } .timeline { list-style:none; padding:0; margin:7px 0 0; max-height:286px; overflow:auto; } .timeline li { padding:10px 3px; border-bottom:1px solid #edf3f8; display:grid; grid-template-columns:90px 72px 1fr; gap:10px; font-size:13px; } .timeline time { color:var(--muted); } .action-label { color:var(--blue); font-weight:600; } .action-counts { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin-top:14px; } .count-item { background:var(--blue-pale); border:1px solid #dceaf7; padding:11px; border-radius:9px; display:grid; gap:4px; } .count-item span { color:var(--muted); font-size:12px; } .count-item strong { color:var(--blue-deep); font-size:22px; } .recent-results { margin-top:14px; min-height:auto; } .round-results { display:grid; grid-template-columns:repeat(8,minmax(0,1fr)); gap:8px; margin-top:14px; } .round-result { display:grid; min-width:0; gap:5px; padding:10px; border:1px solid #dceaf7; border-radius:10px; background:var(--blue-pale); } .round-result.draw { background:#f7f9fb; border-color:#dde5ed; } .round-result small { overflow:hidden; color:var(--muted); font-size:11px; text-overflow:ellipsis; white-space:nowrap; } .round-result strong { color:#124f86; font-size:14px; } .round-result.draw strong { color:#647b94; } .round-result .win-type { color:#1677d2; font-size:12px; font-weight:700; } .round-result.draw .win-type { color:#718395; } @media (max-width:1280px) { .round-results { grid-template-columns:repeat(4,minmax(0,1fr)); } }
  @media (min-width:761px) { .table-layout { grid-template-rows:minmax(154px,auto) minmax(224px,1fr) minmax(154px,auto); } .table-center { min-height:224px; } .table-center strong { font-size:36px; } .turn-beacon { font-size:30px !important; } }
  @media (max-width:760px) { .app-shell{padding:18px 13px 28px}.topbar{align-items:flex-start;flex-direction:column}.summary{grid-template-columns:repeat(2,1fr);gap:16px}.summary div:nth-child(odd){padding-left:0;border-left:0}.table-layout{grid-template-columns:1fr;grid-template-rows:auto}.north,.west,.east,.south,.table-center{grid-column:1;grid-row:auto}.north,.south{width:100%;justify-self:stretch}.table-center{min-height:156px}.lower-layout{grid-template-columns:1fr}.timeline li{grid-template-columns:70px 60px 1fr}.round-results{grid-template-columns:repeat(2,minmax(0,1fr))}.tile{width:28px;height:38px} }
</style>

<script>
  const ACTIONS = {0:'过',2:'碰',3:'明杠',4:'胡',5:'暗杠',6:'补杠',7:'出牌',8:'听'};
  const COUNTS = [[2,'碰'],[3,'明杠'],[4,'胡'],[5,'暗杠'],[6,'补杠'],[7,'出牌']];
  const $ = (id) => document.getElementById(id);
  function tileName(n){ n=Number(n); if(n===53)return '红中'; if(n>=1&&n<=9)return `${n}万`; if(n>=17&&n<=25)return `${n-16}条`; if(n>=33&&n<=41)return `${n-32}筒`; return String(n); }
  function tileSuit(n){ n=Number(n); if(n===53)return 'hong'; if(n>=1&&n<=9)return 'wan'; if(n>=17&&n<=25)return 'tiao'; if(n>=33&&n<=41)return 'tong'; return 'unknown'; }
  function tiles(cards, cls='', pendingCard=null){ if(!cards||!cards.length)return '<span class="empty">—</span>'; const pendingIndex=pendingCard===null?-1:cards.map(Number).lastIndexOf(Number(pendingCard)); return cards.map((c,index)=>`<span class="tile suit-${tileSuit(c)} ${Number(c)===53?'red':''} ${index===pendingIndex?'pending-discard':''} ${cls}">${tileName(c)}</span>`).join(''); }
  function meldTiles(groups){ if(!groups||!groups.length)return ''; return groups.map(group=>Array.isArray(group)?tiles(group,'meld'):'').join(''); }
  function renderSeat(seat,state,active,pendingCard){ const root=document.querySelector(`[data-seat="${seat}"]`); if(!root)return; root.classList.toggle('active',Number(active)===seat); const hand=(state.player_hand_cards||[])[seat]||[]; const discard=(state.played_cards||[])[seat]||[]; const melds=['player_peng_cards','player_gang_cards','player_bugang_cards','player_angang_cards'].map(k=>meldTiles((state[k]||[])[seat]||[])).join(''); root.querySelector('.melds').innerHTML=melds||'<span class="empty">副露：无</span>'; root.querySelector('.hand').innerHTML=tiles(hand,'',Number(active)===seat?pendingCard:null); root.querySelector('.discards').innerHTML=tiles(discard,'discard'); }
  function actionText(e){ const p=e.player_position ?? '—'; const a=ACTIONS[e.action_type]||`动作${e.action_type}`; const cards=(e.action_card||[]).map(tileName).join(' '); return `座位 ${p} · ${a}${cards?' · '+cards:''}`; }
  function renderRoundResults(rounds){ const list=rounds||[]; const myWins=list.filter(round=>[0,2].includes(Number(round.winner_position))).length; $('recent-round-summary').textContent=`我的胜场 ${myWins} / ${list.length}`; const root=$('round-results'); root.innerHTML=list.map(round=>{ const draw=round.winner_position===null; const time=(round.timestamp||'').slice(11,19)||'—'; return `<article class="round-result ${draw?'draw':''}"><small>房间 ${round.room_id} · ${time}</small><strong>${draw?'本局流局':`胜者：座位 ${round.winner_position}`}</strong><span class="win-type">${round.win_type}</span></article>`; }).join('')||'<span class="empty">暂时没有结算记录</span>'; }
  function render(data){ renderRoundResults(data.recent_rounds); const latest=data.latest; const dot=$('connection-dot'); dot.classList.add('ready'); $('connection-text').textContent=latest?'实时日志已连接':'等待首个对局动作'; if(!latest)return; const state=latest.table_state||{}; const active=Number(latest.player_position ?? state.acting_do_player_position); const pendingCard=Number(latest.action_type)===7&&latest.action_card&&latest.action_card.length?latest.action_card[0]:null; $('room-id').textContent=latest.room_id ?? '—'; $('current-player').textContent=Number.isFinite(active)?`座位 ${active}`:'—'; $('wall-count').textContent=state.remain_card_count ?? '—'; $('center-wall').textContent=state.remain_card_count ?? '—'; $('turn-status').textContent=Number.isFinite(active)?`轮到座位 ${active} 出牌`:'等待轮次'; $('table-center').dataset.turn=Number.isFinite(active)?String(active):''; $('latest-action').textContent=(ACTIONS[latest.action_type]||latest.action_type)+' '+(latest.action_card||[]).map(tileName).join(' '); $('turn-hint').textContent=actionText(latest); [0,1,2,3].forEach(s=>renderSeat(s,state,active,pendingCard)); const events=(data.events||[]).slice(-80).reverse(); $('event-count').textContent=`${data.event_count||0} 条`; $('timeline').innerHTML=events.map(e=>`<li><time>${(e.timestamp||'').slice(11,19)||'—'}</time><span class="action-label">${ACTIONS[e.action_type]||e.action_type}</span><span>${actionText(e)}${e.room_id?' · 房间 '+e.room_id:''}</span></li>`).join(''); const c={}; (data.events||[]).forEach(e=>c[e.action_type]=(c[e.action_type]||0)+1); $('action-counts').innerHTML=COUNTS.map(([code,name])=>`<div class="count-item"><span>${name}</span><strong>${c[code]||0}</strong></div>`).join(''); }
  async function refresh(){ try{ const response=await fetch('/api/dashboard/events',{cache:'no-store'}); if(!response.ok)throw new Error(); render(await response.json()); }catch{ $('connection-dot').classList.remove('ready'); $('connection-text').textContent='等待服务或动作日志…'; } }
  refresh(); setInterval(refresh,1000);
</script>
